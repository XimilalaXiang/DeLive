name: Build and Release

on:
  push:
    tags:
      - 'v*'

# 添加权限设置
permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以生成 changelog
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm install
      
      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend
      
      - name: Install server dependencies
        run: npm install
        working-directory: ./server
      
      - name: Build and Package
        run: npm run build && npx electron-builder --${{ matrix.platform }} --publish never
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: release-win

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: release-mac

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release-linux

      - name: Generate Release Notes
        run: node scripts/generate-release-notes.mjs "${{ steps.get_version.outputs.VERSION }}" > release-notes.md
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: DeLive v${{ steps.get_version.outputs.VERSION }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            release-win/*.exe
            release-win/*.exe.blockmap
            release-win/latest.yml
            release-mac/*.dmg
            release-mac/*.zip
            release-mac/latest-mac.yml
            release-linux/*.AppImage
            release-linux/*.deb
            release-linux/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
