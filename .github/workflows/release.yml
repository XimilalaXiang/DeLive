name: Build and Release

on:
  push:
    tags:
      - 'v*'

# 添加权限设置
permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以生成 changelog
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm install
      
      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend
      
      - name: Install server dependencies
        run: npm install
        working-directory: ./server
      
      - name: Build and Package
        run: npm run build && npx electron-builder --${{ matrix.platform }} --publish never
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: release-win

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: release-mac

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release-linux

      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## DeLive ${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📥 下载 / Downloads" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "| 平台 / Platform | 文件 / File | 说明 / Description |" >> $GITHUB_OUTPUT
          echo "|-----------------|-------------|---------------------|" >> $GITHUB_OUTPUT
          echo "| 🪟 Windows | \`DeLive-${{ steps.get_version.outputs.VERSION }}-x64.exe\` | Windows 安装包 / Installer |" >> $GITHUB_OUTPUT
          echo "| 🪟 Windows | \`DeLive-${{ steps.get_version.outputs.VERSION }}-portable.exe\` | 便携版 / Portable |" >> $GITHUB_OUTPUT
          echo "| 🍎 macOS | \`DeLive-${{ steps.get_version.outputs.VERSION }}-mac-x64.dmg\` | macOS Intel 安装包 |" >> $GITHUB_OUTPUT
          echo "| 🍎 macOS | \`DeLive-${{ steps.get_version.outputs.VERSION }}-mac-arm64.dmg\` | macOS Apple Silicon 安装包 |" >> $GITHUB_OUTPUT
          echo "| 🐧 Linux | \`DeLive-${{ steps.get_version.outputs.VERSION }}-linux-x64.AppImage\` | Linux AppImage |" >> $GITHUB_OUTPUT
          echo "| 🐧 Linux | \`DeLive-${{ steps.get_version.outputs.VERSION }}-linux-x64.deb\` | Debian/Ubuntu 安装包 |" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 🔄 更新内容 / What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "请查看 [完整更新日志](https://github.com/${{ github.repository }}/commits/v${{ steps.get_version.outputs.VERSION }})" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📖 使用说明 / Usage" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "1. 下载对应平台的安装包" >> $GITHUB_OUTPUT
          echo "2. 运行安装或直接打开" >> $GITHUB_OUTPUT
          echo "3. 在设置中配置 ASR 服务商的 API 密钥" >> $GITHUB_OUTPUT
          echo "4. 开始录制并享受实时转录！" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "> ⚠️ macOS 用户注意：应用未经 Apple 签名，首次打开需右键选择\"打开\"或在\"系统偏好设置 > 安全性\"中允许运行。" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.get_version.outputs.VERSION }}...HEAD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: DeLive v${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.NOTES }}
          draft: false
          prerelease: false
          files: |
            release-win/*.exe
            release-win/*.exe.blockmap
            release-win/latest.yml
            release-mac/*.dmg
            release-mac/*.zip
            release-mac/latest-mac.yml
            release-linux/*.AppImage
            release-linux/*.deb
            release-linux/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
